# ─────────────────────────────────────────────────────────────────────────────
# SAC ERP - Docker Compose
# Services: MySQL · Spring Boot API · React Frontend
# GitHub: https://github.com/HARIHARAN-R-19
# ─────────────────────────────────────────────────────────────────────────────

networks:
  sac-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local

services:

  # ── MySQL Database ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sac-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-sacroot123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sac_erp}
      MYSQL_USER: ${MYSQL_USER:-sacuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sacpass123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sac-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-sacroot123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot Backend API ─────────────────────────────────────────────────
  sac-backend:
    build:
      context: ./sac_spring_boot
      dockerfile: Dockerfile
    container_name: sac-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-sac_erp}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-sacuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-sacpass123}
      JWT_SECRET: ${JWT_SECRET:-sac-erp-super-secret-jwt-key-2024-hariharan}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:80
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sac-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React Frontend ──────────────────────────────────────────────────────────
  sac-frontend:
    build:
      context: ./sac_react_frontend
      dockerfile: Dockerfile
    container_name: sac-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      sac-backend:
        condition: service_healthy
    networks:
      - sac-network

