# Server Configuration
server.port=8085
server.address=127.0.0.1
server.servlet.context-path=/

# Database Configuration - SAC Test Server (u856184323)
spring.datasource.url=jdbc:mysql://localhost:3306/u856184323_SAC?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=u856184323_SAC_GOTEK
spring.datasource.password=Eash@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.tenant_identifier_resolver=com.sac.erp.tenant.TenantIdentifierResolver
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.open-in-view=false


# Flyway Migration Configuration
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.clean-disabled=true

# JWT Configuration
app.jwt.secret=sac_developed_by_tis_java_spring_boot_migration_secret_key_jwt_2026_enterprise_grade
app.jwt.expiration-ms=86400000

# OpenAPI / Swagger Configuration
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging Configuration
logging.level.com.sac=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Cache Configuration
spring.cache.type=simple

# Tomcat Thread Pool Limits (Optimized for shared hosting)
server.tomcat.threads.max=12
server.tomcat.threads.min-spare=2
server.tomcat.accept-count=10
server.tomcat.max-connections=100
