# ==========================================================================
# SAC ERP - Application Configuration
# School Academy College - Enterprise Resource Planning System
# ==========================================================================

# Server Configuration
server.port=8085
server.servlet.context-path=/

# ==========================================================================
# Database Configuration (MySQL 8)
# ==========================================================================
spring.datasource.url=jdbc:mysql://localhost:3307/sac_erp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=sacuser
spring.datasource.password=sacpass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==========================================================================
# JPA / Hibernate Configuration
# ==========================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.tenant_identifier_resolver=com.sac.erp.tenant.TenantIdentifierResolver
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# ==========================================================================
# Flyway Migration Configuration
# ==========================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# ==========================================================================
# JWT Configuration
# ==========================================================================
app.jwt.secret=sac_developed_by_tis_java_spring_boot_migration_secret_key_jwt_2026_enterprise_grade
app.jwt.expiration-ms=86400000

# ==========================================================================
# Spring Security
# ==========================================================================
spring.security.filter.order=10

# ==========================================================================
# OpenAPI / Swagger Configuration
# ==========================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==========================================================================
# Actuator Configuration
# ==========================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ==========================================================================
# Logging Configuration
# ==========================================================================
logging.level.com.sac=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==========================================================================
# Cache Configuration
# ==========================================================================
spring.cache.type=simple

