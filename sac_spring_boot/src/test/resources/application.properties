# Test configuration - uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:sactest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway for tests (JPA creates schema from entities)
spring.flyway.enabled=false

# JWT secret for tests
app.jwt.secret=testSecretKeyThatIsAtLeast32CharactersLongForHS256
app.jwt.expiration-ms=3600000

# Disable security auto-config for isolated service tests
spring.main.allow-bean-definition-overriding=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.com.sac=DEBUG

spring.jpa.properties.hibernate.tenant_identifier_resolver=com.sac.erp.tenant.TenantIdentifierResolver
